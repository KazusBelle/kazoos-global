name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python — lint & unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r worker/requirements.txt
          pip install pytest==8.3.3
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/shared:${{ github.workspace }}/backend:${{ github.workspace }}/worker
        run: pytest -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker build -f backend/Dockerfile -t kazus-backend:ci .
          docker build -f worker/Dockerfile -t kazus-worker:ci .
          docker build -f frontend/Dockerfile -t kazus-frontend:ci .
